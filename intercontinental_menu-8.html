<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>InterContinental Stadium Experience</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #3E3E38;
      --gold: #C8A24B;
      --cream: #F2EDE0;
      --cream-dim: #BFB89A;
    }
    html, body {
      min-height: 100%;
      background: var(--bg);
      font-family: 'Cormorant Garamond', Georgia, serif;
      overflow-x: hidden;
    }
    .hero {
      width: 100%; position: relative; overflow: hidden;
      animation: fadeIn 1s ease both;
    }
    .hero img { width: 100%; display: block; object-fit: cover; }
    .hero::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0;
      height: 50%; background: linear-gradient(to bottom, transparent, var(--bg));
    }
    .content {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      padding: 0 1.5rem 2.5rem; margin-top: -2rem;
    }
    .divider {
      display: flex; align-items: center; gap: 10px;
      width: 100%; max-width: 320px; margin: 0 0 1.4rem;
      animation: fadeUp 0.8s ease 0.3s both;
    }
    .divider-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--gold)); }
    .divider-line.r { background: linear-gradient(to left, transparent, var(--gold)); }
    .divider-diamond { width: 5px; height: 5px; background: var(--gold); transform: rotate(45deg); flex-shrink: 0; }
    .headline {
      text-align: center; margin-bottom: 1.8rem;
      animation: fadeUp 0.8s ease 0.4s both;
    }
    .headline h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 9vw, 4rem);
      font-weight: 900; color: var(--cream); line-height: 0.92;
    }
    .headline h1 em { font-style: italic; color: var(--gold); }
    .headline .sub {
      margin-top: 0.6rem; font-size: 0.62rem;
      letter-spacing: 0.32em; text-transform: uppercase; color: var(--cream-dim);
    }
    .btns {
      display: flex; flex-direction: column; gap: 1rem;
      width: 100%; max-width: 320px;
    }
    .btn {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.3rem 1.6rem; text-decoration: none; border-radius: 2px;
      position: relative; overflow: hidden; cursor: pointer;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s ease;
    }
    .btn:nth-child(1) { animation: fadeUp 0.8s ease 0.5s both; }
    .btn:nth-child(2) { animation: fadeUp 0.8s ease 0.6s both; }
    .btn::after {
      content: ''; position: absolute; top: 0; left: -100%;
      width: 55%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent);
      transition: left 0.55s ease;
    }
    .btn:hover::after { left: 160%; }
    .btn:hover { transform: translateY(-4px) scale(1.015); }
    .btn:active { transform: scale(0.975); }
    .btn-food {
      background: linear-gradient(135deg, #C8A24B 0%, #A07820 60%, #C8A24B 100%);
      background-size: 200%;
      box-shadow: 0 6px 28px rgba(200,162,75,0.40), 0 2px 6px rgba(0,0,0,0.35);
    }
    .btn-food:hover { background-position: 100%; box-shadow: 0 10px 40px rgba(200,162,75,0.55); }
    .btn-drinks {
      background: transparent; border: 1px solid rgba(200,162,75,0.55);
      box-shadow: 0 3px 16px rgba(0,0,0,0.25);
    }
    .btn-drinks:hover {
      border-color: var(--gold); background: rgba(200,162,75,0.07);
      box-shadow: 0 8px 32px rgba(200,162,75,0.22);
    }
    .btn-inner { display: flex; flex-direction: column; align-items: flex-start; }
    .btn-label { font-family: 'Playfair Display', serif; font-size: 1.25rem; font-weight: 700; line-height: 1; }
    .btn-food .btn-label { color: #1A1208; }
    .btn-drinks .btn-label { color: var(--cream); }
    .btn-caption { font-size: 0.62rem; letter-spacing: 0.22em; text-transform: uppercase; margin-top: 3px; }
    .btn-food .btn-caption { color: rgba(26,18,8,0.55); }
    .btn-drinks .btn-caption { color: rgba(242,237,224,0.4); }
    .btn-icon { font-size: 1.4rem; opacity: 0.9; }
    .footer {
      margin-top: 2rem;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      animation: fadeUp 0.8s ease 0.7s both;
    }
    .dots { display: flex; gap: 5px; }
    .dots span { width: 3px; height: 3px; border-radius: 50%; background: var(--gold); opacity: 0.3; }
    .dots span:nth-child(2) { opacity: 0.65; }
    .footer-txt { font-size: 0.52rem; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(242,237,224,0.22); }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
